name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run tests with scoped coverage
        run: |
          python -m pytest -q \
            tests/test_contract_target_builder.py \
            tests/test_contract_target_builder_horizon.py \
            tests/test_core_trading_logic.py \
            tests/test_db.py \
            tests/test_execution_and_orders.py \
            tests/test_execution_client.py \
            tests/test_execution_client_auth_fallback.py \
            tests/test_feature_builder.py \
            tests/test_live_risk_manager_additional.py \
            tests/test_order_manager.py \
            tests/test_polymarket_auth_info.py \
            tests/test_position_manager.py \
            tests/test_reconciliation_service.py \
            tests/test_shadow_clob_client.py \
            tests/test_shadow_purgatory.py \
            tests/test_trade_lifecycle.py \
            --cov=order_manager \
            --cov=execution_client \
            --cov=reconciliation_service \
            --cov=position_manager \
            --cov=contract_target_builder \
            --cov-fail-under=60
